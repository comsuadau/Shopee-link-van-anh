<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo Link Shopee</title>

<style>
body {
  font-family: Arial;
  background: #e6a892;
  text-align: center;
  padding: 40px;
}

.container {
  background: #f2f2f2;
  padding: 20px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
}

h2 {
  color: #ff5722;
}

input {
  width: 90%;
  padding: 12px;
  border-radius: 8px;
  border: 2px solid #ff5722;
  margin: 15px 0;
}

.btn-main {
  background: #ff5722;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 10px;
  width: 90%;
  cursor: pointer;
  font-weight: bold;
}

.result-box {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-top: 20px;
  text-align: left;
}

.success {
  color: green;
  font-weight: bold;
}

.link {
  word-break: break-all;
  margin: 10px 0;
}

.actions {
  display: flex;
  gap: 10px;
}

.actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.copy {
  background: #ff5722;
  color: white;
}

.buy {
  background: #2ecc71;
  color: white;
}

.share {
  background: #3b5998;
  color: white;
}
</style>
</head>

<body>

<h2>🔗 Tạo Link Shopee</h2>

<div class="container">

  <input id="inputLink" placeholder="Dán link Shopee vào đây..." />

  <button class="btn-main" onclick="createLink()">Tạo Link Ngay</button>

  <div class="result-box" id="resultBox" style="display:none;">
    
    <div class="success">✔ MÃ 25% - ÁP ĐƯỢC</div>

    <div class="link" id="resultLink"></div>

    <div class="actions">
      <button class="copy" onclick="copyLink()">Copy</button>
      <button class="buy" onclick="goLink()">Mua ngay</button>
      <button class="share" onclick="shareFB()">Chia sẻ</button>
    </div>

  </div>

</div>

<script>
let finalLink = "";

function createLink() {
  let input = document.getElementById("inputLink").value;

  if (!input) {
    alert("Dán link vào đi!");
    return;
  }

  // 👉 THAY LINK AFF CỦA BẠN
  let aff = "https://s.shopee.vn/qepO6rXbK";

  finalLink = aff + "?redirect=" + encodeURIComponent(input);

  document.getElementById("resultLink").innerText = finalLink;
  document.getElementById("resultBox").style.display = "block";
}

function copyLink() {
  navigator.clipboard.writeText(finalLink);
  alert("Đã copy!");
}

function goLink() {
  window.open(finalLink, "_blank");
}

function shareFB() {
  let fb = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(finalLink);
  window.open(fb, "_blank");
}
</script>

</body>
</html>
