<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đổi Link Shopee Áp Mã 25%</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Quicksand',sans-serif;
background:#f5f5f5;
text-align:center;
padding:40px
}

.header{
margin-bottom:20px
}

.header img{
width:60px
}

.header h1{
color:#ee4d2d;
font-size:24px;
margin-top:5px
}

.box{
background:white;
width:420px;
margin:auto;
padding:20px;
border-radius:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

.input-area{
position:relative
}

textarea{
width:100%;
height:80px;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
font-size:14px
}

.btn-top{
position:absolute;
right:5px;
top:5px;
display:flex;
gap:5px
}

.btn-top button{
background:#e5e7eb;
border:none;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px
}

.convert{
margin-top:12px;
width:100%;
background:#ee4d2d;
color:white;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer
}

.product{
display:none;
margin-top:20px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08)
}

.product-top{
display:flex;
gap:10px;
text-align:left
}

.product img{
width:70px;
height:70px;
border-radius:8px
}

.name{
font-size:14px
}

.ready{
color:#16a34a;
font-size:13px
}

.copy{
margin-top:12px;
width:100%;
background:#ee4d2d;
color:white;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer
}

.note{
margin-top:10px;
font-size:13px
}

.fbbtn{
margin-top:10px;
background:#1877f2;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer
}

.voucher{
margin-top:15px
}

.voucher img{
width:100%;
border-radius:10px
}

</style>

</head>

<body>

<div class="header">

<img src="https://cdn-icons-png.flaticon.com/512/5977/5977575.png">

<h1>ĐỔI LINK SHOPEE<br>ÁP MÃ 25%</h1>

</div>

<div class="box">

<div class="input-area">

<textarea id="link" placeholder="Dán link Shopee vào đây..."></textarea>

<div class="btn-top">

<button onclick="pasteLink()">📋 Dán link</button>

<button onclick="clearLink()">✖ Xóa</button>

</div>

</div>

<button class="convert" onclick="convertLink()">
CHUYỂN ĐỔI NGAY
</button>

<div class="product" id="productBox">

<div class="product-top">

<img id="pimg">

<div>

<div class="name" id="pname"></div>

<div class="ready">✔ Sẵn sàng áp mã giảm giá</div>

</div>

</div>

<button class="copy" onclick="copyLink()">
🔗 Sao chép link
</button>

<div class="note">
Nhấn "🔗 Sao chép link" và dán vào dưới bình luận bài post này để áp mã 25%
</div>

<button class="fbbtn"
onclick="window.open('https://www.facebook.com/loi.hathi.96/posts/pfbid02pkKLn4aPk3GS82fiJJ6uHN4ovBbUMot4cyvujqKggBshkDVy75nwTMfDjKjn1Fe5l')">

Đến bài đăng Facebook

</button>

<div class="voucher">

<img src="https://i.imgur.com/2m6X7Xx.png">

</div>

</div>

</div>

<script>

let affLink=""

async function pasteLink(){
const text = await navigator.clipboard.readText()
document.getElementById("link").value=text
}

function clearLink(){
document.getElementById("link").value=""
}

async function convertLink(){

let url=document.getElementById("link").value

if(url==""){
alert("Hãy dán link Shopee")
return
}

let api="https://api.allorigins.win/raw?url="+encodeURIComponent(url)

try{

let html=await fetch(api).then(r=>r.text())

let img=html.match(/property="og:image" content="(.*?)"/)

let name=html.match(/property="og:title" content="(.*?)"/)

document.getElementById("pimg").src=img[1]
document.getElementById("pname").innerText=name[1]

}catch{

document.getElementById("pname").innerText="Sản phẩm Shopee"

}

affLink="https://s.shopee.vn/"+btoa(url)+"?siteid=17378000350"

document.getElementById("productBox").style.display="block"

}

function copyLink(){

navigator.clipboard.writeText(affLink)

alert("Đã sao chép link")

}

</script>

</body>
</html>
