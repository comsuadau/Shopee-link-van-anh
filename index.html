<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tạo Link Shopee</title>

<style>

body{
font-family:Arial;
background:#e8b19f;
padding-top:60px
}

.container{
width:420px;
margin:auto
}

.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1)
}

.title{
font-weight:bold;
margin-bottom:10px
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px
}

.create{
margin-top:12px;
width:100%;
background:#ee4d2d;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer
}

.guide{
background:#f5f5f5;
padding:15px;
border-radius:8px;
margin-top:15px;
font-size:14px
}

.facebook{
margin-top:15px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08)
}

.voucher{
display:flex;
gap:10px;
margin-top:10px
}

.fbicon{
width:60px;
height:60px;
background:#1877f2;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
font-size:20px
}

.vtext{
font-size:14px
}

.copy{
margin-top:12px;
width:100%;
background:#ee4d2d;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer
}

</style>

</head>

<body>

<div class="container">

<div class="box">

<div class="title">🔒 Link sản phẩm Shopee</div>

<input id="link" placeholder="Dán link Shopee vào đây...">

<button class="create" onclick="convert()">✏️ Tạo Link Ngay</button>

</div>

<div class="guide">

<b>ℹ Hướng dẫn</b>

<br><br>

1. Sau khi tạo link, nhấn <b>Copy Link</b>  
<br>
2. Dán link dưới bình luận bài đăng này  
<br>
3. Click vào link để mở Shopee sẽ nhận được mã

<br><br>

<button onclick="gotoFB()">Đến bài đăng Facebook</button>

</div>

<div class="facebook" id="resultBox" style="display:none">

<b>Mã giảm giá/hoàn Xu</b>

<div class="voucher">

<div class="fbicon">f</div>

<div class="vtext">

<b>giảm 20% Giảm tối đa 500k</b>

<br>

Đơn tối thiểu 50k

<br>

<span style="color:#ee4d2d">Độc quyền Facebook</span>

</div>

</div>

<button class="copy" onclick="copylink()">SAO CHÉP LINK</button>

</div>

</div>

<script>

let output=""

function convert(){

let link=document.getElementById("link").value

if(link==""){
alert("Hãy dán link Shopee")
return
}

output="https://s.shopee.vn/"+btoa(link)

document.getElementById("resultBox").style.display="block"

}

function copylink(){

navigator.clipboard.writeText(output)

alert("Đã sao chép link")

}

function gotoFB(){

window.open("https://facebook.com")

}

</script>

</body>
</html>
