<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đổi Link Shopee Affiliate</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
text-align:center
}

.box{
background:white;
width:420px;
margin:auto;
padding:25px;
border-radius:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

.title{
color:#ee4d2d;
font-size:20px;
font-weight:bold;
margin-bottom:15px
}

textarea{
width:100%;
height:80px;
border:1px solid #ddd;
border-radius:8px;
padding:10px;
font-size:14px
}

.convert{
margin-top:15px;
width:100%;
background:#ee4d2d;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer
}

.product{
display:none;
margin-top:20px;
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.08)
}

.product-top{
display:flex;
gap:10px
}

.product img{
width:70px;
height:70px;
border-radius:8px
}

.name{
font-size:14px;
text-align:left
}

.ready{
color:#16a34a;
font-size:13px;
margin-top:4px
}

.copy{
margin-top:12px;
width:100%;
background:#ee4d2d;
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer
}

.open{
margin-top:10px;
width:100%;
background:#3b82f6;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer
}

</style>

</head>

<body>

<div class="box">

<div class="title">
ĐỔI LINK SHOPEE AFFILIATE
</div>

<textarea id="link" placeholder="Dán link sản phẩm Shopee vào đây"></textarea>

<button class="convert" onclick="convert()">
CHUYỂN ĐỔI NGAY
</button>

<div class="product" id="productBox">

<div class="product-top">

<img src="https://down-vn.img.susercontent.com/file/sg-11134201-7qvg7-lk6w8w6qk2g8a4">

<div class="name">

<b id="productName">
Sản phẩm Shopee
</b>

<div class="ready">
✔ Sẵn sàng áp mã giảm giá
</div>

</div>

</div>

<button class="copy" onclick="copylink()">
SAO CHÉP LINK
</button>

<button class="open" onclick="openlink()">
MỞ LINK
</button>

</div>

</div>

<script>

let output=""

function convert(){

let link=document.getElementById("link").value

if(link==""){
alert("Hãy dán link Shopee")
return
}

output="https://s.shopee.vn/"+btoa(link)

document.getElementById("productBox").style.display="block"

}

function copylink(){

if(output==""){
alert("Chưa có link")
return
}

navigator.clipboard.writeText(output)

alert("Đã sao chép link")

}

function openlink(){

if(output==""){
alert("Chưa có link")
return
}

window.open(output)

}

</script>

</body>
</html>
