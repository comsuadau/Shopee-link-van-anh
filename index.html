<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đổi Link Shopee</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding-top:80px
}
.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1)
}
input{
width:100%;
padding:12px;
margin-top:10px
}
button{
margin-top:20px;
padding:12px 20px;
background:#ff5722;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer
}
</style>
</head>

<body>

<div class="box">

<h2>ĐỔI LINK SHOPEE AFFILIATE</h2>

<input id="link" placeholder="Dán link Shopee vào đây">

<button onclick="convert()">Chuyển đổi</button>

<p id="result"></p>

</div>

<script>

function convert(){

let link=document.getElementById("link").value

let newlink="https://s.shopee.vn/"+btoa(link)

document.getElementById("result").innerHTML=newlink

}

</script>

</body>
</html>
